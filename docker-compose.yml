services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_USER=documind
      - POSTGRES_PASSWORD=localdev
      - POSTGRES_DB=documind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: